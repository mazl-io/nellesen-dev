<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marcel Nellesen</title>
<style>
  :root {
    --ground: #F4F6F8;
    --text: #16191F;
    --muted: #5A636E;
    --accent: #0E7C77;   /* Editorial Teal */
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "Cascadia Code", "SF Mono", "Segoe UI Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--ground); color: var(--text);
    font-family: var(--sans); line-height: 1.55;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  main { width: 100%; max-width: 640px; }
  .eyebrow {
    font-family: var(--mono); font-size: .8rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--accent); margin: 0 0 .5rem;
  }
  h1 { font-size: clamp(1.9rem, 5vw, 2.8rem); line-height: 1.1; margin: 0; }
  footer { margin-top: 2.5rem; color: var(--muted); font-size: .85rem; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<main>
  <p class="eyebrow">nellesen.dev</p>
  <h1>Marcel Nellesen</h1>
  <footer>
    <a href="https://github.com/mazl-io">github.com/mazl-io</a>
  </footer>
</main>
</body>
</html>
